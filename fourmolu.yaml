indentation: 2
column-limit: none
function-arrows: trailing
comma-style: leading
import-export-style: diff-friendly
indent-wheres: false
record-brace-space: false
newlines-between-decls: 1
haddock-style: multi-line
haddock-style-module: multi-line
let-style: auto
in-style: right-align
single-constraint-parens: never
unicode: never
respectful: false
fixities: []
reexports:
  - module ClassyPrelude.Yesod exports Prelude
  - module Import.NoFoundation exports Prelude
  - module Import exports Prelude
  - module TestImport exports Prelude
